version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-your-gcp-project-id}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-75-hard-dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcloud.json
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./backend/app:/app/app:ro
      # Mount GCP application default credentials for Firestore access
      - ~/.config/gcloud/application_default_credentials.json:/secrets/gcloud.json:ro
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network

  # Hot-reload frontend for active development (use: docker-compose --profile dev up)
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - app-network
    profiles:
      - dev

networks:
  app-network:
    driver: bridge
