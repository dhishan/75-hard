name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev or prod)"
        required: true
        default: "prod"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

jobs:
  deploy-infra:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify state bucket exists
        run: gsutil ls gs://75hard-prod-tfstate/ > /dev/null

      - name: Terraform Init
        run: make terraform-init TF_ENV=${{ env.TF_ENV }}

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == ''
        run: make terraform-plan TF_ENV=${{ env.TF_ENV }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: make terraform-apply TF_ENV=${{ env.TF_ENV }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: make terraform-destroy TF_ENV=${{ env.TF_ENV }}
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Show Outputs
        if: github.event.inputs.action != 'destroy'
        run: |
          cd terraform/main
          terraform output
        continue-on-error: true
